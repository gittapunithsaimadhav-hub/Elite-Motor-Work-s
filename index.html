<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elite Motor Work's</title>

<style>
body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:#f4f6f9;
}

header{
background:black;
color:white;
padding:20px 60px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
text-decoration:none;
margin:0 15px;
font-size:18px;
}

nav a:hover{
color:orange;
}

.hero{
background-image:url("https://www.bmw-motorrad.in/content/dam/bmwmotorradnsc/common/images/models/m/m1000rr/2024/offer/nsc-m1000rr-P0N3S-offer-01.jpg.asset.1728477644358.jpg");
background-size:cover;
background-position:center;
padding:150px 20px;
text-align:center;
color:white;
}

.hero-box{
background:rgba(0,0,0,0.6);
padding:60px;
}

button{
padding:10px 20px;
background:darkgray;
border:none;
font-size:16px;
color:white;
cursor:pointer;
}

button:hover{
background:black;
}

#welcome{
font-size:20px;
margin-top:10px;
color:yellow;
}
</style>

</head>

<body>

<!-- Header -->

<header>

<img src="che .jpeg.png" width="100">

<h1 style="margin-right:18cm;">Elite Motor Work's</h1>

<nav>
<a href="#home">Home</a>
<a href="service.html" target="_blank">Services</a>
<a href="contactus.html" target="_blank">Contact</a>
</nav>

</header>

<!-- Hero Section -->

<section id="home" class="hero">

<div class="hero-box">

<h2 style="font-size:45px;">Drive Your Dream Super Bike Today</h2>

<p style="font-size:25px;">SPEED • PERFORMANCE • COMFORT</p>

<p id="welcome"></p>

<button onclick="exploreBikes()">
  <a href="bike.html" target="_blank" style="color:white; text-decoration:none; margin:0 15px;">EXPLORE MORE</a>
</button>

</div>

</section>

<script>

/* Explore Button */
function exploreBikes(){
alert("Welcome to Elite Motor Work's 🚀\nExplore the best superbikes!");
window.location.href="bike.htm";
}

/* Dynamic Welcome Message */

let hour = new Date().getHours();
let message;

if(hour < 12){
message = "☀️ Good Morning Rider!";
}
else if(hour < 18){
message = "🔥 Good Afternoon Speed Lover!";
}
else{
message = "🌙 Good Evening Bike Enthusiast!";
}

document.getElementById("welcome").innerHTML = message;

/* Smooth Scroll */

document.querySelectorAll('a[href^="#"]').forEach(anchor => {
anchor.addEventListener("click", function(e){
e.preventDefault();

document.querySelector(this.getAttribute("href")).scrollIntoView({
behavior:"smooth"
});

});
});

</script>

</body>
</html>
